<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - n0tls</title>
    <meta name="description" content="{{ excerpt }}">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed.xml">
</head>
<body>
    <header>
        <h1><a href="/" style="color: inherit; text-decoration: none;">n0tls</a></h1>
        <nav>
            <a href="/">Home</a>
            <a href="/feed.xml">RSS</a>
            <a href="/transcripts.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg>Transcripts</a>
            <button class="theme-toggle" id="theme-toggle">Toggle Dark Mode</button>
        </nav>
    </header>

    <main>
        <article>
            <h1>{{ title }}</h1>
            <div class="post-meta">
                <time datetime="{{ date }}">{{ date_formatted }}</time>
                {% if tags %}
                <div class="tags">
                    {% for tag in tags %}
                    <a href="/tag/{{ tag }}.html" class="tag">{{ tag }}</a>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
            <hr>
            {{ content }}
        </article>
    </main>

    <footer>
        <p>&copy; {{ year }} n0tls. All rights reserved.</p>
    </footer>

    <script>
        // Dark mode toggle
        const toggleButton = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';

        document.documentElement.setAttribute('data-theme', currentTheme);

        toggleButton.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';

            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
