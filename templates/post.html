<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - n0tls</title>
    <meta name="description" content="{{ excerpt }}">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="alternate" type="application/rss+xml" title="RSS Feed" href="/feed.xml">
</head>
<body>
    <header>
        <h1><a href="/" style="color: inherit; text-decoration: none;">n0tls</a></h1>
        <nav>
            <a href="/"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span class="nav-label">Home</span></a>
            <a href="/feed.xml"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20 4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg><span class="nav-label">RSS</span></a>
            <a href="/transcripts.html"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align:middle;margin-right:4px"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H6l-2 2V4h16v12z"/></svg><span class="nav-label">Transcripts</span></a>
            <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">🌙</button>
        </nav>
    </header>

    <main>
        <article>
            <h1>{{ title }}</h1>
            <div class="post-meta">
                <time datetime="{{ date }}">{{ date_formatted }}</time>
                {% if tags %}
                <div class="tags">
                    {% for tag in tags %}
                    <a href="/tag/{{ tag }}.html" class="tag">{{ tag }}</a>
                    {% endfor %}
                </div>
                {% endif %}
            </div>
            <hr>
            {{ content }}
        </article>
    </main>

    <footer>
        <p>&copy; {{ year }} n0tls. All rights reserved.</p>
    </footer>

    <script>
        const toggleButton = document.getElementById('theme-toggle');
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', currentTheme);
        toggleButton.textContent = currentTheme === 'dark' ? '☀️' : '🌙';
        toggleButton.addEventListener('click', () => {
            const theme = document.documentElement.getAttribute('data-theme');
            const newTheme = theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            toggleButton.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        });
    </script>
</body>
</html>
